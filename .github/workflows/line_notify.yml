name: Send LINE Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils zip # zipを追加

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.8'
          channel: 'stable'

      - name: Generate Bitmap Font if missing
        run: |
          mkdir -p $FONT_DIR
          if [ ! -f "$FONT_DIR/japanese_font.zip" ]; then
            echo "Bitmap font not found. Generating from TTF..."
            
            npm install msdf-bmfont-xml -g
            
            mkdir -p temp_font
            curl -L "https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSansJP/NotoSansJP-Regular.ttf" -o temp_font/font.ttf
            curl -l "https://gist.githubusercontent.com/kgsi/ed2f1c5696a2211c1fd1e1e198c96ee4/raw/118bb818cffe159eb4e906f82980465cd0b0021e/japanese_full.txt" -o charset.txt
            font-bmfont -f xml -i charset.txt -s 24 -t 2048 temp_font/font.ttf
            
            zip -j $FONT_DIR/japanese_font.zip font.fnt font.png
            
            echo "Successfully generated $FONT_DIR/japanese_font.zip"
          else
            echo "Bitmap font already exists. Skipping generation."
          fi
        env:
          FONT_DIR: ${{ github.workspace }}/fonts

      - name: Run integration test and generate JSON
        run: |
          cd truck_manager
          mkdir -p $TMP_DIR $FONT_DIR $CONFIG_DIR
          dart pub get
          dart run lib/app.dart
        env:
          TMP_DIR: ${{ github.workspace }}/tmp
          FONT_DIR: ${{ github.workspace }}/fonts
          CONFIG_DIR: ${{ github.workspace }}/config

          OAUTH_ID: ${{ secrets.OAUTH_ID }}
          OAUTH_SECRET: ${{ secrets.OAUTH_SECRET }}
          G_REFRESH_TOKEN: ${{ secrets.G_REFRESH_TOKEN }}
          GOOGLE_SERVICE_CRED: ${{secrets.GOOGLE_SERVICE_CRED}}

          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}

          SHIFT_SHEET_ID: ${{ secrets.SHIFT_SHEET_ID }}

          TARGET: "${{ secrets.TARGET }}"

          GAS_WEB_HOOK: ${{ secrets.GAS_WEB_HOOK }}

          GDRIVE_UPLOAD_FOLDER_ID : ${{ secrets.GDRIVE_UPLOAD_FOLDER_ID }}
          GEMINI_API_KEY : ${{ secrets.GEMINI_API_KEY }}
          PROJECT_ID : ${{ secrets.PROJECT_ID }}