name: truck_manager
description: A pure Dart project for batch processing.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '^3.1.3'

dependencies:
  # --- 認証とGoogleサービス (Gmail, Sheets, Firestore) ---
  googleapis: ^13.1.0
  googleapis_auth: ^1.4.1
  
  # --- HTTP通信 (LINE API等) ---
  http: ^1.1.0

  # --- 基本ユーティリティ ---
  sprintf: ^7.0.0
  json_annotation: ^4.9.0
  path: ^1.9.0

  # --- 画像・PDF処理 (Flutter非依存の代替案) ---
  # 画像に文字を焼き付ける(Canvasの代替)ために使用
  image: ^4.1.7
  pdf: ^3.10.7
  dart_pdf_reader: ^0.1.0
  dotenv: ^4.2.0

dev_dependencies:
  lints: ^2.1.0
  test: ^1.24.0
  
  # capsules.g.dart 生成に必須
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  mockito: ^5.4.4

